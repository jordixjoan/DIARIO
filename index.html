<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIARIO - Fanzine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding-top: 80px; /* Asegura que el contenido no quede oculto por el header fijo */
        }
        header {
            position: fixed; /* Hace que el encabezado sea fijo */
            top: 0;
            left: 0;
            width: 100%;
            padding: 40px 0;
            background-color: #2d2d2d;
            color: white;
            text-align: center;
            z-index: 1000; /* Asegura que el encabezado esté siempre por encima del contenido */
        }
        header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        header p {
            font-size: 1.2rem;
        }
        nav {
            display: flex;
            justify-content: center;
            background-color: #333;
            padding: 10px 0;
            width: 100%;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-size: 1.1rem;
            font-weight: bold;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .content {
            width: 80%;
            max-width: 1200px;
            margin-top: 40px;
            text-align: center;
        }
        .home {
            background-color: #fff;
            padding: 60px;
            margin-bottom: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .home h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        .home p {
            font-size: 1.2rem;
            color: #666;
        }
        .shop {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 30px;
            margin-bottom: 40px;
        }
        .product-card {
            background-color: #fff;
            width: 30%;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .product-card img {
            width: 100%;
            border-radius: 8px;
            object-fit: cover;
        }
        .product-card h3 {
            font-size: 1.5rem;
            margin-top: 15px;
        }
        .product-card .price {
            font-size: 1.3rem;
            color: #27ae60;
            font-weight: bold;
            margin: 10px 0;
        }
