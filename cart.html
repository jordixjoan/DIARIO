<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proceso de Pago</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; }
        .checkout-container { margin-top: 50px; }
        h1 { font-size: 24px; }
        button { padding: 10px 20px; cursor: pointer; background-color: #4CAF50; color: white; border: none; font-size: 16px; }
        button:hover { background-color: #45a049; }
    </style>
</head>
<body>
    <div class="checkout-container">
        <h1>Confirmación de Compra</h1>
        <p>Haz clic en el botón de abajo para completar tu compra.</p>
        <button id="checkout-button">Pagar con Stripe</button>
    </div>

    <script src="https://js.stripe.com/v3/"></script>
    <script>
        // Obtén la URL del pago desde el backend
        async function createCheckoutSession() {
            try {
                // Llama a tu backend para obtener la URL de Stripe
                const response = await fetch("https://diario-production-f6f2.up.railway.app/create-checkout-session", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ cartItems: JSON.parse(localStorage.getItem("cart")) })  // Utiliza el carrito almacenado en el localStorage
                });

                if (!response.ok) {
                    throw new Error(`Error en el servidor: ${response.status}`);
                }

                const data = await response.json();

                if (data.url) {
                    // Redirige al cliente a la URL de pago de Stripe
                    window.location.href = data.url;
                } else {
                    throw new Error("No se recibió una URL de pago.");
                }
            } catch (error) {
                alert("Hubo un problema con el pago: " + error.message);
            }
        }

        // Cuando el usuario hace clic en el botón, inicia el proceso de pago
        document.getElementById("checkout-button").addEventListener("click", function () {
            createCheckoutSession();
        });
    </script>
</body>
</html>
